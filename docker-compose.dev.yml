
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_SECURE=false
      - MAIL_USER=thephotographerltd@gmail.com
      - MAIL_PASS=pymy olhw nkca bhms
      - MAIL_FROM=Bigg Shots Media <thephotographerltd@gmail.com>
      - ADMIN_EMAIL=hello@biggshotsmedia.com
      - SITE_URL=https://biggshotsmedia.com
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped


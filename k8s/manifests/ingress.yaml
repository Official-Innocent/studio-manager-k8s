apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: biggshots-ingress
  namespace: biggshots
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
spec:
  ingressClassName: nginx
  rules:
  - host: biggshots.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80

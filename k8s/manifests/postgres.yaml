apiVersion: apps/v1
kind: Deployment
metadata:
  name: biggshots-postgres
  namespace: biggshots
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: biggshots-postgres
  template:
    metadata:
      labels:
        app: biggshots-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: biggshots-config
              key: DB_NAME
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: biggshots-config
              key: DB_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: biggshots-secret
              key: DB_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: biggshots-postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: biggshots-postgres-pvc
  namespace: biggshots
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: biggshots-postgres
  namespace: biggshots
spec:
  selector:
    app: biggshots-postgres
  ports:
  - port: 5432
    targetPort: 5432

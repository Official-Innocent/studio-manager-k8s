apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-service
  namespace: biggshots
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler-service
  template:
    metadata:
      labels:
        app: scheduler-service
    spec:
      containers:
      - name: scheduler-service
        image: innocentobuteofficial/scheduler-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3003
        envFrom:
        - configMapRef:
            name: biggshots-config
        - secretRef:
            name: biggshots-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 20
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler-service
  namespace: biggshots
spec:
  selector:
    app: scheduler-service
  ports:
  - port: 3003
    targetPort: 3003

apiVersion: apps/v1
kind: Deployment
metadata:
  name: biggshots-redis
  namespace: biggshots
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biggshots-redis
  template:
    metadata:
      labels:
        app: biggshots-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: biggshots-redis
  namespace: biggshots
spec:
  selector:
    app: biggshots-redis
  ports:
  - port: 6379
    targetPort: 6379

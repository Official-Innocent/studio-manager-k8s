apiVersion: v1
data:
  00-create-prod-role.sql: |
    -- Compatibility shim for demo/dev environments
    -- The schema dump (01-schema.sql) was exported from production and hardcodes
    -- "ALTER ... OWNER TO biggshots_prod" statements. Rather than maintain a
    -- patched copy of the schema, we create a role alias here so the dump runs
    -- unmodified in any environment.
    DO
    $$
    BEGIN
       IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'biggshots_prod') THEN
          CREATE ROLE biggshots_prod;
       END IF;
    END
    $$;
  01-schema.sql: "--\n-- PostgreSQL database dump\n--\n\n\\restrict xLxPb3pWrVXcaNRy99aTOXa2rOecOUlQsUAors6W2nR3fgxjpb1woDjboS9oaQH\n\n--
    Dumped from database version 16.14\n-- Dumped by pg_dump version 16.14\n\nSET
    statement_timeout = 0;\nSET lock_timeout = 0;\nSET idle_in_transaction_session_timeout
    = 0;\nSET client_encoding = 'UTF8';\nSET standard_conforming_strings = on;\nSELECT
    pg_catalog.set_config('search_path', '', false);\nSET check_function_bodies =
    false;\nSET xmloption = content;\nSET client_min_messages = warning;\nSET row_security
    = off;\n\n--\n-- Name: pgcrypto; Type: EXTENSION; Schema: -; Owner: -\n--\n\nCREATE
    EXTENSION IF NOT EXISTS pgcrypto WITH SCHEMA public;\n\n\n--\n-- Name: EXTENSION
    pgcrypto; Type: COMMENT; Schema: -; Owner: \n--\n\nCOMMENT ON EXTENSION pgcrypto
    IS 'cryptographic functions';\n\n\n--\n-- Name: uuid-ossp; Type: EXTENSION; Schema:
    -; Owner: -\n--\n\nCREATE EXTENSION IF NOT EXISTS \"uuid-ossp\" WITH SCHEMA public;\n\n\n--\n--
    Name: EXTENSION \"uuid-ossp\"; Type: COMMENT; Schema: -; Owner: \n--\n\nCOMMENT
    ON EXTENSION \"uuid-ossp\" IS 'generate universally unique identifiers (UUIDs)';\n\n\n--\n--
    Name: update_updated_at(); Type: FUNCTION; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    FUNCTION public.update_updated_at() RETURNS trigger\n    LANGUAGE plpgsql\n    AS
    $$\nBEGIN\n  NEW.updated_at = NOW();\n  RETURN NEW;\nEND;\n$$;\n\n\nALTER FUNCTION
    public.update_updated_at() OWNER TO biggshots_prod;\n\nSET default_tablespace
    = '';\n\nSET default_table_access_method = heap;\n\n--\n-- Name: admin_users;
    Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE TABLE public.admin_users
    (\n    id uuid DEFAULT public.uuid_generate_v4() NOT NULL,\n    email character
    varying(255) NOT NULL,\n    password_hash character varying(255) NOT NULL,\n    name
    character varying(255) DEFAULT 'Studio Owner'::character varying NOT NULL,\n    role
    character varying(50) DEFAULT 'owner'::character varying NOT NULL,\n    created_at
    timestamp with time zone DEFAULT now() NOT NULL,\n    last_login timestamp with
    time zone\n);\n\n\nALTER TABLE public.admin_users OWNER TO biggshots_prod;\n\n--\n--
    Name: blocked_dates; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.blocked_dates (\n    id uuid DEFAULT public.uuid_generate_v4() NOT
    NULL,\n    date date NOT NULL,\n    reason character varying(255),\n    created_at
    timestamp with time zone DEFAULT now() NOT NULL\n);\n\n\nALTER TABLE public.blocked_dates
    OWNER TO biggshots_prod;\n\n--\n-- Name: bookings; Type: TABLE; Schema: public;
    Owner: biggshots_prod\n--\n\nCREATE TABLE public.bookings (\n    id uuid DEFAULT
    public.uuid_generate_v4() NOT NULL,\n    client_id uuid,\n    first_name character
    varying(100) NOT NULL,\n    last_name character varying(100) NOT NULL,\n    email
    character varying(255) NOT NULL,\n    phone character varying(30),\n    session_type
    character varying(100) NOT NULL,\n    session_date date NOT NULL,\n    session_time
    time without time zone,\n    duration_hours numeric(4,1),\n    location text,\n
    \   notes text,\n    package_id uuid,\n    status character varying(30) DEFAULT
    'pending'::character varying NOT NULL,\n    payment_status character varying(30)
    DEFAULT 'unpaid'::character varying NOT NULL,\n    amount_total numeric(10,2),\n
    \   amount_paid numeric(10,2) DEFAULT 0,\n    contract_signed boolean DEFAULT
    false NOT NULL,\n    contract_signed_at timestamp with time zone,\n    internal_notes
    text,\n    created_at timestamp with time zone DEFAULT now() NOT NULL,\n    updated_at
    timestamp with time zone DEFAULT now() NOT NULL,\n    calendar_event_id character
    varying(255),\n    enquiry_source character varying(100),\n    enquiry_source_detail
    text\n);\n\n\nALTER TABLE public.bookings OWNER TO biggshots_prod;\n\n--\n-- Name:
    client_loyalty; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.client_loyalty (\n    id uuid DEFAULT gen_random_uuid() NOT NULL,\n
    \   client_id uuid NOT NULL,\n    total_sessions integer DEFAULT 0 NOT NULL,\n
    \   current_cycle integer DEFAULT 0 NOT NULL,\n    threshold integer DEFAULT 3
    NOT NULL,\n    discount_pct integer DEFAULT 10 NOT NULL,\n    award_count integer
    DEFAULT 0 NOT NULL,\n    last_award_at timestamp with time zone,\n    updated_at
    timestamp with time zone DEFAULT now() NOT NULL,\n    created_at timestamp with
    time zone DEFAULT now() NOT NULL\n);\n\n\nALTER TABLE public.client_loyalty OWNER
    TO biggshots_prod;\n\n--\n-- Name: clients; Type: TABLE; Schema: public; Owner:
    biggshots_prod\n--\n\nCREATE TABLE public.clients (\n    id uuid DEFAULT public.uuid_generate_v4()
    NOT NULL,\n    email character varying(255) NOT NULL,\n    password_hash character
    varying(255),\n    first_name character varying(100) NOT NULL,\n    last_name
    character varying(100) NOT NULL,\n    phone character varying(30),\n    address
    text,\n    notes text,\n    created_at timestamp with time zone DEFAULT now()
    NOT NULL,\n    last_login timestamp with time zone,\n    is_active boolean DEFAULT
    true NOT NULL,\n    portal_enabled boolean DEFAULT false NOT NULL,\n    welcome_sent_at
    timestamp with time zone,\n    birthday date,\n    session_anniversary date,\n
    \   anniversary_date date,\n    marketing_consent boolean DEFAULT true,\n    tags
    text[],\n    loyalty_threshold integer DEFAULT 3,\n    loyalty_discount integer
    DEFAULT 10,\n    status character varying(20) DEFAULT 'active'::character varying,\n
    \   CONSTRAINT clients_status_check CHECK (((status)::text = ANY (ARRAY[('lead'::character
    varying)::text, ('prospect'::character varying)::text, ('active'::character varying)::text,
    ('delivered'::character varying)::text, ('archived'::character varying)::text])))\n);\n\n\nALTER
    TABLE public.clients OWNER TO biggshots_prod;\n\n--\n-- Name: contract_templates;
    Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE TABLE public.contract_templates
    (\n    id uuid DEFAULT gen_random_uuid() NOT NULL,\n    name text NOT NULL,\n
    \   contract_type text DEFAULT 'general'::text NOT NULL,\n    body text NOT NULL,\n
    \   is_default boolean DEFAULT false,\n    created_at timestamp with time zone
    DEFAULT now() NOT NULL,\n    updated_at timestamp with time zone DEFAULT now()
    NOT NULL\n);\n\n\nALTER TABLE public.contract_templates OWNER TO biggshots_prod;\n\n--\n--
    Name: contracts; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.contracts (\n    id uuid DEFAULT gen_random_uuid() NOT NULL,\n    project_id
    uuid,\n    client_id uuid NOT NULL,\n    template_id uuid,\n    contract_type
    text DEFAULT 'general'::text NOT NULL,\n    title text NOT NULL,\n    body text
    NOT NULL,\n    status text DEFAULT 'draft'::text NOT NULL,\n    client_name_signed
    text,\n    client_signature text,\n    signed_at timestamp with time zone,\n    sent_at
    timestamp with time zone,\n    created_at timestamp with time zone DEFAULT now()
    NOT NULL,\n    updated_at timestamp with time zone DEFAULT now() NOT NULL,\n    CONSTRAINT
    contracts_status_check CHECK ((status = ANY (ARRAY['draft'::text, 'sent'::text,
    'signed'::text, 'declined'::text])))\n);\n\n\nALTER TABLE public.contracts OWNER
    TO biggshots_prod;\n\n--\n-- Name: delivery_timeframes; Type: TABLE; Schema: public;
    Owner: biggshots_prod\n--\n\nCREATE TABLE public.delivery_timeframes (\n    id
    uuid DEFAULT gen_random_uuid() NOT NULL,\n    session_type text NOT NULL,\n    delivery_days
    integer NOT NULL,\n    gallery_expiry_days integer DEFAULT 30 NOT NULL,\n    label
    text NOT NULL\n);\n\n\nALTER TABLE public.delivery_timeframes OWNER TO biggshots_prod;\n\n--\n--
    Name: doc_counters; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.doc_counters (\n    doc_type text NOT NULL,\n    last_num integer
    DEFAULT 1000 NOT NULL\n);\n\n\nALTER TABLE public.doc_counters OWNER TO biggshots_prod;\n\n--\n--
    Name: email_log; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.email_log (\n    id uuid DEFAULT public.uuid_generate_v4() NOT NULL,\n
    \   to_email character varying(255) NOT NULL,\n    subject character varying(500)
    NOT NULL,\n    template character varying(100),\n    status character varying(30)
    DEFAULT 'sent'::character varying NOT NULL,\n    error text,\n    sent_at timestamp
    with time zone DEFAULT now() NOT NULL,\n    client_id uuid,\n    body text,\n
    \   from_email text,\n    created_at timestamp with time zone DEFAULT now(),\n
    \   project_id uuid,\n    direction text DEFAULT 'outbound'::text,\n    email_type
    text\n);\n\n\nALTER TABLE public.email_log OWNER TO biggshots_prod;\n\n--\n--
    Name: galleries; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.galleries (\n    id uuid DEFAULT public.uuid_generate_v4() NOT NULL,\n
    \   client_id uuid,\n    booking_id uuid,\n    title character varying(255) NOT
    NULL,\n    slug character varying(255) NOT NULL,\n    access_token character varying(255)
    DEFAULT encode(public.gen_random_bytes(32), 'hex'::text) NOT NULL,\n    password_hash
    character varying(255),\n    cover_image_id uuid,\n    description text,\n    session_date
    date,\n    is_published boolean DEFAULT false NOT NULL,\n    allow_downloads boolean
    DEFAULT true NOT NULL,\n    allow_sharing boolean DEFAULT false NOT NULL,\n    show_watermark
    boolean DEFAULT false NOT NULL,\n    expires_at timestamp with time zone,\n    download_count
    integer DEFAULT 0 NOT NULL,\n    view_count integer DEFAULT 0 NOT NULL,\n    created_at
    timestamp with time zone DEFAULT now() NOT NULL,\n    updated_at timestamp with
    time zone DEFAULT now() NOT NULL,\n    cover_photo_url text,\n    display_style
    text DEFAULT 'standard'::text,\n    delivered_at timestamp with time zone\n);\n\n\nALTER
    TABLE public.galleries OWNER TO biggshots_prod;\n\n--\n-- Name: invoices; Type:
    TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE TABLE public.invoices
    (\n    id uuid DEFAULT public.uuid_generate_v4() NOT NULL,\n    invoice_number
    character varying(50) NOT NULL,\n    booking_id uuid,\n    client_id uuid,\n    client_name
    character varying(255),\n    client_email character varying(255) NOT NULL,\n    line_items
    jsonb DEFAULT '[]'::jsonb NOT NULL,\n    subtotal numeric(10,2) NOT NULL,\n    tax_rate
    numeric(5,2) DEFAULT 0 NOT NULL,\n    tax_amount numeric(10,2) DEFAULT 0 NOT NULL,\n
    \   total numeric(10,2) NOT NULL,\n    amount_paid numeric(10,2) DEFAULT 0 NOT
    NULL,\n    status character varying(30) DEFAULT 'draft'::character varying NOT
    NULL,\n    due_date date,\n    paid_at timestamp with time zone,\n    notes text,\n
    \   created_at timestamp with time zone DEFAULT now() NOT NULL,\n    updated_at
    timestamp with time zone DEFAULT now() NOT NULL,\n    project_id uuid,\n    quote_id
    uuid,\n    deposit_pct numeric(5,2) DEFAULT 25,\n    bank_name text DEFAULT 'Monzo'::text,\n
    \   monzo_link text,\n    invoice_type text DEFAULT 'deposit'::text NOT NULL,\n
    \   bank_sort_code text,\n    deposit_amt numeric(10,2) DEFAULT 0,\n    sent_at
    timestamp with time zone,\n    bank_account text,\n    payment_ref text,\n    client_message
    text,\n    payment_method text\n);\n\n\nALTER TABLE public.invoices OWNER TO biggshots_prod;\n\n--\n--
    Name: packages; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.packages (\n    id uuid DEFAULT public.uuid_generate_v4() NOT NULL,\n
    \   name character varying(100) NOT NULL,\n    slug character varying(100) NOT
    NULL,\n    price numeric(10,2) NOT NULL,\n    duration_text character varying(100),\n
    \   description text,\n    features jsonb DEFAULT '[]'::jsonb NOT NULL,\n    is_featured
    boolean DEFAULT false NOT NULL,\n    is_active boolean DEFAULT true NOT NULL,\n
    \   sort_order integer DEFAULT 0 NOT NULL,\n    created_at timestamp with time
    zone DEFAULT now() NOT NULL\n);\n\n\nALTER TABLE public.packages OWNER TO biggshots_prod;\n\n--\n--
    Name: password_reset_tokens; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.password_reset_tokens (\n    id integer NOT NULL,\n    client_id
    uuid,\n    token character varying(255) NOT NULL,\n    expires_at timestamp with
    time zone NOT NULL,\n    used_at timestamp with time zone,\n    created_at timestamp
    with time zone DEFAULT now()\n);\n\n\nALTER TABLE public.password_reset_tokens
    OWNER TO biggshots_prod;\n\n--\n-- Name: password_reset_tokens_id_seq; Type: SEQUENCE;
    Schema: public; Owner: biggshots_prod\n--\n\nCREATE SEQUENCE public.password_reset_tokens_id_seq\n
    \   AS integer\n    START WITH 1\n    INCREMENT BY 1\n    NO MINVALUE\n    NO
    MAXVALUE\n    CACHE 1;\n\n\nALTER SEQUENCE public.password_reset_tokens_id_seq
    OWNER TO biggshots_prod;\n\n--\n-- Name: password_reset_tokens_id_seq; Type: SEQUENCE
    OWNED BY; Schema: public; Owner: biggshots_prod\n--\n\nALTER SEQUENCE public.password_reset_tokens_id_seq
    OWNED BY public.password_reset_tokens.id;\n\n\n--\n-- Name: payment_installments;
    Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE TABLE public.payment_installments
    (\n    id uuid DEFAULT gen_random_uuid() NOT NULL,\n    plan_id uuid NOT NULL,\n
    \   project_id uuid NOT NULL,\n    client_id uuid NOT NULL,\n    installment_num
    integer NOT NULL,\n    label text NOT NULL,\n    amount numeric(10,2) NOT NULL,\n
    \   due_date date NOT NULL,\n    status text DEFAULT 'pending'::text NOT NULL,\n
    \   is_deposit boolean DEFAULT false NOT NULL,\n    is_non_refundable boolean
    DEFAULT false NOT NULL,\n    paid_at timestamp with time zone,\n    paid_amount
    numeric(10,2),\n    payment_method text,\n    payment_ref text,\n    reminder_sent_7d
    boolean DEFAULT false,\n    reminder_sent_1d boolean DEFAULT false,\n    reminder_sent_overdue
    boolean DEFAULT false,\n    invoice_id uuid,\n    notes text,\n    created_at
    timestamp with time zone DEFAULT now() NOT NULL,\n    updated_at timestamp with
    time zone DEFAULT now() NOT NULL,\n    arrangement_agreed boolean DEFAULT false,\n
    \   arrangement_note text,\n    CONSTRAINT payment_installments_status_check CHECK
    ((status = ANY (ARRAY['pending'::text, 'sent'::text, 'paid'::text, 'overdue'::text,
    'waived'::text])))\n);\n\n\nALTER TABLE public.payment_installments OWNER TO biggshots_prod;\n\n--\n--
    Name: payment_methods; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.payment_methods (\n    id uuid DEFAULT gen_random_uuid() NOT NULL,\n
    \   name text NOT NULL,\n    method_type text DEFAULT 'bank_transfer'::text NOT
    NULL,\n    bank_name text,\n    sort_code text,\n    account_no text,\n    account_name
    text,\n    payment_link text,\n    notes text,\n    is_default boolean DEFAULT
    false,\n    created_at timestamp with time zone DEFAULT now() NOT NULL,\n    CONSTRAINT
    payment_methods_method_type_check CHECK ((method_type = ANY (ARRAY['bank_transfer'::text,
    'payment_link'::text, 'cash'::text, 'other'::text])))\n);\n\n\nALTER TABLE public.payment_methods
    OWNER TO biggshots_prod;\n\n--\n-- Name: payment_plans; Type: TABLE; Schema: public;
    Owner: biggshots_prod\n--\n\nCREATE TABLE public.payment_plans (\n    id uuid
    DEFAULT gen_random_uuid() NOT NULL,\n    project_id uuid NOT NULL,\n    client_id
    uuid NOT NULL,\n    total_amount numeric(10,2) NOT NULL,\n    amount_paid numeric(10,2)
    DEFAULT 0 NOT NULL,\n    status text DEFAULT 'active'::text NOT NULL,\n    created_at
    timestamp with time zone DEFAULT now() NOT NULL,\n    updated_at timestamp with
    time zone DEFAULT now() NOT NULL,\n    CONSTRAINT payment_plans_status_check CHECK
    ((status = ANY (ARRAY['active'::text, 'completed'::text, 'cancelled'::text])))\n);\n\n\nALTER
    TABLE public.payment_plans OWNER TO biggshots_prod;\n\n--\n-- Name: payments;
    Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE TABLE public.payments
    (\n    id uuid DEFAULT public.uuid_generate_v4() NOT NULL,\n    invoice_id uuid,\n
    \   booking_id uuid,\n    order_id uuid,\n    amount numeric(10,2) NOT NULL,\n
    \   currency character varying(3) DEFAULT 'GBP'::character varying NOT NULL,\n
    \   method character varying(30) NOT NULL,\n    status character varying(30) DEFAULT
    'pending'::character varying NOT NULL,\n    provider_ref character varying(255),\n
    \   metadata jsonb,\n    created_at timestamp with time zone DEFAULT now() NOT
    NULL\n);\n\n\nALTER TABLE public.payments OWNER TO biggshots_prod;\n\n--\n-- Name:
    photo_selections; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.photo_selections (\n    id uuid DEFAULT public.uuid_generate_v4()
    NOT NULL,\n    gallery_id uuid NOT NULL,\n    photo_id uuid NOT NULL,\n    client_id
    uuid,\n    list_type character varying(30) DEFAULT 'favourites'::character varying
    NOT NULL,\n    selected_at timestamp with time zone DEFAULT now() NOT NULL\n);\n\n\nALTER
    TABLE public.photo_selections OWNER TO biggshots_prod;\n\n--\n-- Name: photos;
    Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE TABLE public.photos
    (\n    id uuid DEFAULT public.uuid_generate_v4() NOT NULL,\n    gallery_id uuid
    NOT NULL,\n    filename character varying(500) NOT NULL,\n    original_name character
    varying(500),\n    file_path text NOT NULL,\n    thumb_path text,\n    web_path
    text,\n    file_size bigint,\n    width integer,\n    height integer,\n    mime_type
    character varying(100),\n    exif_data jsonb,\n    face_data jsonb,\n    ai_tags
    jsonb,\n    sort_order integer DEFAULT 0 NOT NULL,\n    is_cover boolean DEFAULT
    false NOT NULL,\n    upload_at timestamp with time zone DEFAULT now() NOT NULL\n);\n\n\nALTER
    TABLE public.photos OWNER TO biggshots_prod;\n\n--\n-- Name: portal_activity_log;
    Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE TABLE public.portal_activity_log
    (\n    id uuid DEFAULT gen_random_uuid() NOT NULL,\n    client_id uuid,\n    activity_type
    character varying(50) NOT NULL,\n    reference_id uuid,\n    meta jsonb,\n    created_at
    timestamp with time zone DEFAULT now()\n);\n\n\nALTER TABLE public.portal_activity_log
    OWNER TO biggshots_prod;\n\n--\n-- Name: print_orders; Type: TABLE; Schema: public;
    Owner: biggshots_prod\n--\n\nCREATE TABLE public.print_orders (\n    id uuid DEFAULT
    public.uuid_generate_v4() NOT NULL,\n    client_id uuid,\n    gallery_id uuid,\n
    \   prodigi_order_id character varying(255),\n    status character varying(30)
    DEFAULT 'pending'::character varying NOT NULL,\n    line_items jsonb DEFAULT '[]'::jsonb
    NOT NULL,\n    shipping_name character varying(255),\n    shipping_address jsonb,\n
    \   subtotal numeric(10,2),\n    shipping_cost numeric(10,2),\n    commission
    numeric(10,2),\n    total numeric(10,2),\n    tracking_number character varying(255),\n
    \   carrier character varying(100),\n    notes text,\n    created_at timestamp
    with time zone DEFAULT now() NOT NULL,\n    updated_at timestamp with time zone
    DEFAULT now() NOT NULL\n);\n\n\nALTER TABLE public.print_orders OWNER TO biggshots_prod;\n\n--\n--
    Name: project_stage_log; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.project_stage_log (\n    id uuid DEFAULT gen_random_uuid() NOT NULL,\n
    \   project_id uuid NOT NULL,\n    from_stage text,\n    to_stage text NOT NULL,\n
    \   triggered_doc text,\n    email_sent boolean DEFAULT false,\n    override_used
    boolean DEFAULT false,\n    notes text,\n    created_at timestamp with time zone
    DEFAULT now() NOT NULL\n);\n\n\nALTER TABLE public.project_stage_log OWNER TO
    biggshots_prod;\n\n--\n-- Name: projects; Type: TABLE; Schema: public; Owner:
    biggshots_prod\n--\n\nCREATE TABLE public.projects (\n    id uuid DEFAULT gen_random_uuid()
    NOT NULL,\n    booking_id uuid,\n    client_id uuid NOT NULL,\n    title text
    NOT NULL,\n    stage text DEFAULT 'lead'::text NOT NULL,\n    session_type text,\n
    \   session_date date,\n    session_location text,\n    notes text,\n    internal_notes
    text,\n    amount_quoted numeric(10,2),\n    amount_invoiced numeric(10,2),\n
    \   deposit_paid numeric(10,2) DEFAULT 0,\n    balance_paid numeric(10,2) DEFAULT
    0,\n    cover_photo text,\n    created_at timestamp with time zone DEFAULT now()
    NOT NULL,\n    updated_at timestamp with time zone DEFAULT now() NOT NULL,\n    delivery_due_date
    date,\n    gallery_expiry_date date,\n    delivery_days integer,\n    balance_due_date
    date,\n    archived_reason text,\n    follow_up_flag boolean DEFAULT false,\n
    \   follow_up_date date,\n    follow_up_note text,\n    CONSTRAINT projects_stage_check
    CHECK ((stage = ANY (ARRAY['lead'::text, 'quote_sent'::text, 'booked'::text, 'covered'::text,
    'delivered'::text, 'completed'::text, 'archived'::text])))\n);\n\n\nALTER TABLE
    public.projects OWNER TO biggshots_prod;\n\n--\n-- Name: promotions; Type: TABLE;
    Schema: public; Owner: biggshots_prod\n--\n\nCREATE TABLE public.promotions (\n
    \   id integer NOT NULL,\n    type character varying(20) DEFAULT 'banner'::character
    varying,\n    message text NOT NULL,\n    eyebrow character varying(100),\n    cta_label
    character varying(100),\n    cta_link character varying(255),\n    bg_colour character
    varying(20) DEFAULT 'gold'::character varying,\n    show_countdown boolean DEFAULT
    false,\n    active boolean DEFAULT false,\n    starts_at timestamp with time zone,\n
    \   ends_at timestamp with time zone,\n    created_at timestamp with time zone
    DEFAULT now(),\n    updated_at timestamp with time zone DEFAULT now(),\n    last_broadcast_at
    timestamp with time zone,\n    reminder_sent boolean DEFAULT false,\n    show_availability_count
    boolean DEFAULT false,\n    availability_month character varying(7)\n);\n\n\nALTER
    TABLE public.promotions OWNER TO biggshots_prod;\n\n--\n-- Name: promotions_id_seq;
    Type: SEQUENCE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE SEQUENCE public.promotions_id_seq\n
    \   AS integer\n    START WITH 1\n    INCREMENT BY 1\n    NO MINVALUE\n    NO
    MAXVALUE\n    CACHE 1;\n\n\nALTER SEQUENCE public.promotions_id_seq OWNER TO biggshots_prod;\n\n--\n--
    Name: promotions_id_seq; Type: SEQUENCE OWNED BY; Schema: public; Owner: biggshots_prod\n--\n\nALTER
    SEQUENCE public.promotions_id_seq OWNED BY public.promotions.id;\n\n\n--\n-- Name:
    questionnaire_templates; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.questionnaire_templates (\n    id uuid DEFAULT gen_random_uuid()
    NOT NULL,\n    name text NOT NULL,\n    session_type text,\n    questions jsonb
    DEFAULT '[]'::jsonb NOT NULL,\n    created_at timestamp with time zone DEFAULT
    now() NOT NULL\n);\n\n\nALTER TABLE public.questionnaire_templates OWNER TO biggshots_prod;\n\n--\n--
    Name: questionnaires; Type: TABLE; Schema: public; Owner: biggshots_prod\n--\n\nCREATE
    TABLE public.questionnaires (\n    id uuid DEFAULT gen_random_uuid() NOT NULL,\n
    \   project_id uuid,\n    client_id uuid NOT NULL,\n    template_id uuid,\n    title
    text NOT NULL,\n    questions jsonb DEFAULT '[]'::jsonb NOT NULL,\n    answers
    jsonb DEFAULT '{}'::jsonb,\n    status text DEFAULT 'draft'::text NOT NULL,\n
    \   sent_at timestamp with time zone,\n    completed_at timestamp with time zone,\n
    \   created_at timestamp with time zone DEFAULT now() NOT NULL,\n    admin_notes
    text,\n    CONSTRAINT questionnaires_status_check CHECK ((status = ANY (ARRAY['draft'::text,
    'sent'::text, 'completed'::text])))\n);\n\n\nALTER TABLE public.questionnaires
    OWNER TO biggshots_prod;\n\n--\n-- Name: quote_addons; Type: TABLE; Schema: public;

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: biggshots-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: innocentobuteofficial/bsm-frontend:k8s
        imagePullPolicy: Always
        env:
        - name: K8S_NAMESPACE
          value: "biggshots-demo"
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "150m"
        volumeMounts:
        - name: portfolio-data
          mountPath: /usr/share/nginx/html/assets/portfolio
          subPath: portfolio
          readOnly: true
      volumes:
      - name: portfolio-data
        persistentVolumeClaim:
          claimName: content-service-pvc
          readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: biggshots-demo
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP

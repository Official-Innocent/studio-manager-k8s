apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: biggshots-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: innocentobuteofficial/auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3007
        envFrom:
        - configMapRef:
            name: biggshots-config
        - secretRef:
            name: biggshots-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 3007
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3007
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: biggshots-demo
spec:
  selector:
    app: auth-service
  ports:
  - port: 3007
    targetPort: 3007

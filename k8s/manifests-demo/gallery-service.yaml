apiVersion: apps/v1
kind: Deployment
metadata:
  name: gallery-service
  namespace: biggshots-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gallery-service
  template:
    metadata:
      labels:
        app: gallery-service
    spec:
      containers:
      - name: gallery-service
        image: innocentobuteofficial/gallery-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: biggshots-config
        - secretRef:
            name: biggshots-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
---
apiVersion: v1
kind: Service
metadata:
  name: gallery-service
  namespace: biggshots-demo
spec:
  selector:
    app: gallery-service
  ports:
  - port: 3002
    targetPort: 3002

---
# k8s/service-monitors/service-monitors.yaml
# Prometheus Operator ServiceMonitor resources.
# These tell Prometheus to scrape /metrics on each service every 15s.
# Apply with: kubectl apply -f k8s/service-monitors/service-monitors.yaml

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: notification-service-monitor
  namespace: biggshots
  labels:
    release: prometheus   # must match the Helm release label selector
spec:
  selector:
    matchLabels:
      app: notification-service
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - biggshots


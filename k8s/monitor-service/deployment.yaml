---
# k8s/monitor-service/deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor-service
  namespace: biggshots
  labels:
    app: monitor-service
    stage: "8"
spec:
  replicas: 1   # SSE server — single replica is fine (no shared state)
  selector:
    matchLabels:
      app: monitor-service
  template:
    metadata:
      labels:
        app: monitor-service
    spec:
      containers:
        - name: monitor-service
          image: innocentobuteofficial/monitor-service:latest
          imagePullPolicy: Never   # kind cluster — images loaded with kind load
          ports:
            - containerPort: 3006
              name: http
          envFrom:
            - configMapRef:
                name: monitor-service-config
            - secretRef:
                name: monitor-service-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: monitor-service
  namespace: biggshots
  labels:
    app: monitor-service
spec:
  selector:
    app: monitor-service
  ports:
    - name: http
      port: 3006
      targetPort: http

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: monitor-service-config
  namespace: biggshots
data:
  PORT: "3006"
  SSE_INTERVAL_MS: "10000"
  # Prometheus inside the cluster — kube-prometheus-stack default service name
  PROMETHEUS_URL: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "biggshots"
  DB_USER: "biggshots_user"
  # Use stub GA4 data until production credentials are wired in
  GA4_STUB: "true"

---
# kubectl create secret generic monitor-service-secrets \
#   --namespace biggshots \
#   --from-literal=DB_PASSWORD=<your-db-password> \
#   --from-literal=GA4_PROPERTY_ID=properties/<your-id> \
#   --from-literal=GA4_API_KEY=<your-key>
#
# The secret is NOT checked into git. Create it manually before deploying.

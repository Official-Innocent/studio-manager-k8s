    location ~ /\. { deny all; return 404; }
    location ~ \.(env|log|sql|conf|bak|backup|sh)$ { deny all; return 404; }
    location ~ ^/(src|scripts|docker|node_modules)/ { deny all; return 404; }
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / {
        proxy_pass          http://172.29.0.1:8082;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;

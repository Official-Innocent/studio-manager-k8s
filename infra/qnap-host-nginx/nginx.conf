server {
    listen 80;
    server_name www.biggshotsmedia.com;
    return 301 https://biggshotsmedia.com$request_uri;
}
server {
    listen 80;
    server_name biggshotsmedia.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://biggshotsmedia.com$request_uri; }
}
server {
    listen 80;
    server_name k3-demo.biggshotsmedia.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://k3-demo.biggshotsmedia.com$request_uri; }
}
server {
    listen 443 ssl;
    server_name www.biggshotsmedia.com;
    ssl_certificate     /etc/letsencrypt/live/biggshotsmedia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biggshotsmedia.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    return 301 https://biggshotsmedia.com$request_uri;
}
server {
    listen 443 ssl;
    server_name biggshotsmedia.com;
    ssl_certificate     /etc/letsencrypt/live/biggshotsmedia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biggshotsmedia.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    client_max_body_size 500M;
    client_body_timeout 300s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    location ~ /\. { deny all; return 404; }
    location ~ \.(env|log|sql|conf|bak|backup|sh)$ { deny all; return 404; }
    location ~ ^/(src|scripts|docker|node_modules)/ { deny all; return 404; }
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location ^~ /monitor/ {
        proxy_pass          http://172.29.0.1:8081;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }
    location / {
        proxy_pass          http://172.29.0.1:8081;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Forwarded-Host  $host;
        proxy_cookie_path   /                 /;
        proxy_read_timeout  300s;
        proxy_buffering     off;
    }
}
server {
    listen 443 ssl;
    server_name k3-demo.biggshotsmedia.com;
    ssl_certificate     /etc/letsencrypt/live/biggshotsmedia.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biggshotsmedia.com-0001/privkey.pem;

name: CI - Build Changed Services

on:
  push:
    branches: [main]

jobs:
  build-notification:
    if: contains(toJson(github.event.commits.*.modified), 'services/notification-service')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build and push notification-service
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker build -t innocentobuteofficial/notification-service:latest services/notification-service/
          docker push innocentobuteofficial/notification-service:latest

  build-gallery:
